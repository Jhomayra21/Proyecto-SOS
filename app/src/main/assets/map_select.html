<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seleccionar ubicación</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
<style> html, body, #map { height: 100%; margin:0; padding:0; } </style>
</head>
<body>
<div id="map"></div>
<script>
  var map = L.map('map').setView([0,0], 2);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
  var marker;
  function onMapClick(e) {
    if (marker) { map.removeLayer(marker); }
    marker = L.marker(e.latlng).addTo(map);
    // enviar coordenadas a Android
    if (window.AndroidInterface && window.AndroidInterface.onLocationSelected) {
      window.AndroidInterface.onLocationSelected(e.latlng.lat, e.latlng.lng);
    }
  }
  map.on('click', onMapClick);
  // intentar centrar en ubicacion del navegador
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function(pos){ map.setView([pos.coords.latitude, pos.coords.longitude], 13); });
  }
</script>
</body>
</html>
